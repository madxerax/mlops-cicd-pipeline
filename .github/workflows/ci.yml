name: CI - MLOps Pipeline

# Dispara en cada push a main/develop y en cada Pull Request hacia main.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Cancela corridas previas del mismo ref si llega un push nuevo (ahorra minutos).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  # Umbrales del quality gate del modelo (centralizados aquí).
  MIN_ACCURACY: "0.92"
  MIN_F1: "0.92"
  MAX_LOG_LOSS: "0.40"

jobs:
  # 1) Calidad de código: lint estático. Falla rápido y barato.
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Instalar dependencias de desarrollo
        run: pip install -r requirements-dev.txt
      - name: Ejecutar ruff
        run: ruff check src tests

  # 2) Tests: matriz sobre varias versiones de Python. Incluye validación de
  #    datos, calidad del modelo e inferencia. Sube cobertura como artefacto.
  test:
    name: Tests (py${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Instalar dependencias
        run: pip install -r requirements-dev.txt
      - name: Ejecutar test suite con cobertura
        run: pytest --cov=src --cov-report=xml --cov-report=term-missing
      - name: Subir reporte de cobertura
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # 3) Entrenamiento + quality gate del modelo. Solo corre si los tests pasan.
  #    Produce el artefacto del modelo y sus métricas, y bloquea si el modelo
  #    no cumple los umbrales mínimos.
  train-and-gate:
    name: Entrenar y validar modelo
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Entrenar modelo
        run: python -m src.train --n-estimators 200
      - name: Quality gate del modelo
        run: |
          python -m src.validate_model \
            --min-accuracy "${MIN_ACCURACY}" \
            --min-f1 "${MIN_F1}" \
            --max-log-loss "${MAX_LOG_LOSS}"
      - name: Subir artefactos del modelo
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/
          retention-days: 30

  # 4) Verificación del build de Docker (sin publicar). Confirma que la imagen
  #    de serving se construye con el modelo recién entrenado.
  docker-build:
    name: Verificar build de Docker
    needs: train-and-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Descargar artefactos del modelo
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/
      - name: Build de la imagen
        run: docker build -t mlops-pipeline:ci-${{ github.sha }} .
      - name: Smoke test del contenedor
        run: |
          docker run -d --name api -p 8000:8000 mlops-pipeline:ci-${{ github.sha }}
          sleep 8
          curl -fsS http://localhost:8000/health | grep -q '"status":"ok"'
          docker rm -f api
